name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify IntelliJ model
        run: |
          chmod +x gradlew
          python3 scripts/verify_intellij_dependency_metadata.py
          ./gradlew ideaModule --stacktrace

      - name: Test and build
        run: |
          ./gradlew test runGameTestServer build --stacktrace

      - name: Package release candidate
        run: |
          ./gradlew releaseBundle --stacktrace
          python3 scripts/verify_release_artifact.py \
            build/libs/lostcitiesroadfixes-1.0.0+mc1.21.1.jar \
            --bundle build/distributions/lostcitiesroadfixes-1.0.0+mc1.21.1-release.zip

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lostcitiesroadfixes
          path: |
            build/libs/lostcitiesroadfixes-1.0.0+mc1.21.1.jar
            build/distributions/lostcitiesroadfixes-1.0.0+mc1.21.1-release.zip
          if-no-files-found: error
