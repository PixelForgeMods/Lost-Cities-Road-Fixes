name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify IntelliJ model
        run: |
          chmod +x gradlew
          ./gradlew ideaModule --stacktrace

      - name: Test and build
        run: |
          ./gradlew test runGameTestServer build --stacktrace

      - name: Upload universal JAR
        uses: actions/upload-artifact@v4
        with:
          name: lostcitiesroadfixes
          path: build/libs/*.jar
          if-no-files-found: error
